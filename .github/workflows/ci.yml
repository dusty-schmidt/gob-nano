name: GOB CI

on:
  push:
    branches: [ main, micro-task-* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: flake8 src/gob/ --count --show-source --statistics

    - name: Test with pytest
      run: pytest tests/ -v --cov=src/gob --cov-report=term-missing || true

    - name: Syntax Check
      run: python -m py_compile src/gob/**/*.py
