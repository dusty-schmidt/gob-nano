# NANO Configuration
# Secrets are loaded from .env file

agent:
  name: gob
  profile: default

discord:
  token: ${DISCORD_BOT_TOKEN}
  prefix: !

llm:
  provider: openrouter
  endpoint: https://openrouter.ai/api/v1
  model: qwen/qwen3.5-flash-02-23
  api_key: ${OPENROUTER_API_KEY}
  max_tokens: 4096
  temperature: 0.7

tools:
  enabled:
    - response
    - search_engine
    - code_execution
    - text_editor
    - document_query
  disabled: []
