agent:
  name: gob
  profile: default

default_mode: tui

llm:
  api_key: ${OPENROUTER_API_KEY}
  endpoint: https://openrouter.ai/api/v1
  max_tokens: 4096
  temperature: 0.7
  chat_model: qwen/qwen3.6-plus-preview:free
  embedding_model: all-MiniLM-L6-v2

tools:
  enabled:
    - response
    - search_engine
    - code_execution
    - text_editor
    - document_query
  disabled: []
