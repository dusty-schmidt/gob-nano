services:
  gob:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    stdin_open: true
    tty: true

    # Load .env from project root
    env_file:
      - ../.env

    # Mount config so edits don't require rebuild
    volumes:
      - ../config:/app/config

    environment:
      - PYTHONUNBUFFERED=1

    command: python -m gob.run_gob --tui
