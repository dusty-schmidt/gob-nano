services:
  nano:
    image: gob-nano:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    stdin_open: true
    tty: true
    
    # Load environment variables from .env (in parent directory)
    env_file:
      - ../.env
    
    # Bind mounts for config and data
    volumes:
      - ./config:/a0/config
      - ./src/nano/data:/a0/data
      - ./workdir:/a0/workdir
      - ./tmp:/a0/tmp
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    
    # Command to run (can be overridden)
    command: python -m src.nano.main --mode tui
